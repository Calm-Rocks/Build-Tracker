<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Tracker — Login</title>
  <style>
    :root {
      --bg: #313338;
      --surface: #383A40;
      --surface2: #2E3035;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.12);
      --text: #F2F3F5;
      --text-muted: #B5BAC1;
      --text-faint: #80848E;
      --accent: #5865F2;
      --danger-text: #F28082;
      --radius: 6px;
      --radius-lg: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'gg sans', 'Noto Sans', Whitney, 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg); padding: 32px;
      width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--text-faint); margin-bottom: 24px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    input {
      background: var(--surface2); border: 1px solid var(--border-strong);
      border-radius: var(--radius); color: var(--text);
      font-size: 14px; padding: 9px 12px; outline: none;
      transition: border-color 0.15s; width: 100%;
      font-family: inherit;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 10px; border-radius: var(--radius);
      background: var(--accent); color: white; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #4752C4; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-google {
      width: 100%; padding: 10px; border-radius: var(--radius);
      background: white; color: #3c4043; border: 1px solid #dadce0;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; margin-top: 6px;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: #f8f9fa; }
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 18px 0; color: var(--text-faint); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border-strong);
    }
    .error {
      background: rgba(237,66,69,0.15); border: 1px solid rgba(237,66,69,0.3);
      border-radius: var(--radius); padding: 10px 12px;
      font-size: 13px; color: var(--danger-text);
      margin-bottom: 14px; display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Build Tracker</h1>
    <p class="subtitle">Sign in to your account</p>
    <div class="error" id="error"></div>

    <a href="/api/auth/google">
      <button class="btn-google" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </button>
    </a>

    <div class="divider">or</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="btn" onclick="login()">Sign in</button>
  </div>

  <script>
    // Handle error params from Google callback
    const params = new URLSearchParams(window.location.search);
    const errorParam = params.get('error');
    if (errorParam === 'google_failed') {
      showError('Google sign in failed. Please try again or use email and password.');
    } else if (errorParam === 'no_invite') {
      showError('No invite found for your Google account. Please request an invite first.');
    }

    document.getElementById('email').focus();

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn');

      document.getElementById('error').style.display = 'none';

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('next') || '/';
        } else {
          showError(data.error || 'Invalid email or password.');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch (err) {
        showError('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
